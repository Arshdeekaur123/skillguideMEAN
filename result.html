<!DOCTYPE html>
<html>
<head>
  <title>🚀 Job Recommendations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">
<div class="container">
  <h2 class="text-center mt-4 text-warning">🚀 Your Recommended Jobs</h2>

  <div id="result" class="row mt-4"></div>

  <div class="text-center mt-4">
    <a href="/upload" class="btn btn-warning">⬅ Go Back</a>
  </div>
</div>

<script>
const result = JSON.parse(localStorage.getItem("result")) || [];
const container = document.getElementById("result");

console.log("ML RESULT:", result);

if (result.length > 0) {
  container.innerHTML = result.map(r => `
    <div class="col-md-4 mb-4">
      <div class="card p-3 bg-dark text-white shadow h-100">

        <h5 class="text-warning">${r.job || "No Job"}</h5>

        <p>Score: <b class="text-success">${r.score || "0%"}</b></p>

        <p>Skills Match:</p>
        <div class="progress mb-2">
          <div class="progress-bar bg-success" style="width:${r.percent || 0}%">
            ${r.percent || 0}%
          </div>
        </div>

        <p>Skills:</p>
        ${
          (r.job_skills || []).map(skill =>
            (r.matched_skills || []).includes(skill)
              ? `<span class="badge bg-success m-1">${skill}</span>`
              : `<span class="badge bg-danger m-1">${skill}</span>`
          ).join("")
        }

        <p class="mt-2">Missing Skills:</p>
        <p class="text-info">${(r.missing || []).join(", ") || "None 🎉"}</p>

      </div>
    </div>
  `).join("");
} else {
  container.innerHTML = `<h3 class="text-center text-danger mt-5">No jobs found 😔</h3>`;
}
</script>

</body>
</html>

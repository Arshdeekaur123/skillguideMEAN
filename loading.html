<!DOCTYPE html>
<html>
<head>
    <title>Analyzing Resume...</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            margin:0;
            padding:0;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
            flex-direction:column;
        }

        .loader-circle{
            width:90px;
            height:90px;
            border:8px solid #334155;
            border-top:8px solid #facc15;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin-bottom:30px;
        }

        @keyframes spin{
            100%{ transform:rotate(360deg);}
        }

        h2{
            color:#facc15;
            margin-bottom:15px;
        }

        p{
            font-size:20px;
            color:#cbd5e1;
        }

        .dots::after{
            content:'';
            animation:dots 1.5s infinite;
        }

        @keyframes dots{
            0%{content:'';}
            33%{content:'.';}
            66%{content:'..';}
            100%{content:'...';}
        }
    </style>
</head>
<body>

    <div class="loader-circle"></div>
    <h2>🚀 Analyzing Your Skills</h2>
    <p class="dots">Finding Best Career Matches</p>

<script>
async function getPrediction(){
    const text = localStorage.getItem("skillsText") || "";

    const response = await fetch("http://localhost:5000/predict", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({ text:text })
    });

    const data = await response.json();

    localStorage.setItem("result", JSON.stringify(data.result));

    setTimeout(()=>{
        window.location.href="/result";
    },2000);
}

getPrediction();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>SkillGuide Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white p-4">
<script src="/script.js"></script>
<h2 class="mb-4">🚀 SkillGuide Dashboard</h2>

<div class="row">

  <!-- LEFT: ADD SKILL -->
  <div class="col-md-4">
    <div class="card p-3 text-dark">
      <h5>Add Skill</h5>

      <input id="name" class="form-control mb-2" placeholder="Skill Name">
      <input id="level" class="form-control mb-2" placeholder="Level">
      <input id="category" class="form-control mb-2" placeholder="Category">

      <button onclick="addSkill()" class="btn btn-primary">Add</button>
    </div>
  </div>

  <!-- RIGHT: SKILLS -->
  <div class="col-md-8">
    <div id="skills" class="row"></div>
  </div>

</div>

<hr class="my-4">

<h3>💼 Job Recommendations</h3>
<div id="jobs" class="row"></div>

<script src="/script.js"></script>
</body>
</html>
